<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SYNC — Subsidiary sYnergy & Control Hub</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap');
:root{
  --navy:#0B1F3A; --navy2:#12294A; --navy3:#1C3A63; --teal:#009CA6; --tealD:#0B7C83; --tealL:#E6F4F5;
  --amber:#F5A623; --amberL:#FEF4E2; --red:#E03E3E; --redL:#FCEAEA; --green:#1FA971; --greenL:#E7F5EE;
  --paper:#F2F5F8; --line:#E2E8F0; --lineL:#F1F5F9; --mute:#6B7C93; --ink:#0B1F3A;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--paper);color:var(--ink);line-height:1.45;display:flex;min-height:100vh}
.mono{font-family:'JetBrains Mono',monospace}

/* ============ SIDEBAR ============ */
aside{width:236px;flex-shrink:0;background:var(--navy);padding:20px 13px;position:sticky;top:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column;gap:2px}
.brand{display:flex;align-items:center;gap:10px;padding:2px 6px 16px}
.brand .logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--teal),#00D4C8);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:15px}
.brand b{color:#fff;font-size:18px;letter-spacing:1px;display:block}
.brand small{color:#7E93AE;font-size:9px}
.nav{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:9px;cursor:pointer;color:#AEBED2;font-size:13px;font-weight:500;transition:.15s;border:none;background:none;width:100%;text-align:left;font-family:inherit}
.nav:hover{background:var(--navy2);color:#fff}
.nav.on{background:var(--teal);color:#fff;font-weight:600}
.nav .badge{margin-left:auto;font-size:9.5px;font-weight:700;padding:1px 7px;border-radius:20px;background:var(--navy2);color:#AEBED2}
.nav .badge.hot{background:var(--red);color:#fff}
.nav svg{flex-shrink:0}
.pelindo{margin-top:auto;padding:13px;border-radius:12px;background:linear-gradient(135deg,var(--navy2),var(--navy));border:1px solid var(--navy3)}
.pelindo .chip{background:#fff;border-radius:8px;padding:6px 10px;display:inline-block;color:var(--navy);font-weight:800;font-size:13px;letter-spacing:.5px}
.pelindo div{color:#7E93AE;font-size:10.5px;margin-top:6px}

/* ============ MAIN ============ */
main{flex:1;padding:20px 24px 60px;max-width:1220px;margin:0 auto;width:100%;min-width:0}
.tophead{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:16px}
h1{font-size:22px;font-weight:800;letter-spacing:-.4px}
.sub{font-size:12.5px;color:var(--mute);margin-top:2px}
.period{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.period .pbox{background:#fff;border:1px solid var(--line);border-radius:9px;padding:7px 11px;font-size:12px;font-weight:600;white-space:nowrap}
.period .muted{color:var(--mute)}

.card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px}
.card h2{font-size:12.5px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.card h2 .lk{margin-left:auto;font-size:11.5px;font-weight:600;color:var(--teal);cursor:pointer;text-transform:none;letter-spacing:0}
.grid{display:grid;gap:12px}
.g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(4,1fr)}.g6{grid-template-columns:repeat(6,1fr)}
.gwide{grid-template-columns:1.6fr 1fr}
@media(max-width:960px){.g3,.g4,.g6,.gwide,.g2{grid-template-columns:1fr 1fr}}
@media(max-width:640px){.g2,.g3,.g4,.g6,.gwide{grid-template-columns:1fr}aside{display:none}}

/* kpi cards */
.kcard{background:#fff;border:1px solid var(--line);border-radius:13px;padding:13px;position:relative}
.kcard .dot{position:absolute;top:13px;right:13px;width:8px;height:8px;border-radius:20px}
.kcard .lab{font-size:10px;color:var(--mute);font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.kcard .unit{font-size:9.5px;color:var(--mute)}
.kcard .val{font-size:21px;font-weight:800;letter-spacing:-.5px;margin-top:2px}
.kcard .yoy{font-size:11.5px;font-weight:700;margin-top:2px}

/* pills & chips */
.pill{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:20px}
.sdot{width:8px;height:8px;border-radius:20px;display:inline-block}
.tag{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:20px;background:#EEF2F7;color:var(--mute)}

/* tables */
table{width:100%;border-collapse:collapse}
th{font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:var(--mute);font-weight:700;text-align:left;padding:9px 10px;border-bottom:1px solid var(--line);white-space:nowrap}
td{padding:10px;font-size:12.5px;border-bottom:1px solid var(--lineL);vertical-align:middle}
tr.click{cursor:pointer;transition:.12s}
tr.click:hover{background:#F7FAFC}
.tr{text-align:right}.tc{text-align:center}

/* controls */
.controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
select,input[type=text]{font-family:inherit;font-size:12.5px;font-weight:500;border:1px solid var(--line);border-radius:9px;padding:8px 11px;background:#fff;color:var(--ink)}
.seg{display:flex;background:#fff;border:1px solid var(--line);border-radius:9px;overflow:hidden}
.seg button{border:none;background:none;font-family:inherit;font-size:12px;font-weight:600;color:var(--mute);padding:8px 12px;cursor:pointer;border-right:1px solid var(--line)}
.seg button:last-child{border-right:none}
.seg button.on{background:var(--teal);color:#fff}
.btn{border:none;border-radius:9px;padding:9px 14px;font-family:inherit;font-size:12.5px;font-weight:700;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:6px}
.btn.navy{background:var(--navy);color:#fff}.btn.navy:hover{background:var(--navy2)}
.btn.ghost{background:#fff;border:1px solid var(--line);color:var(--ink)}
.btn.done{background:var(--greenL);color:var(--green);cursor:default}
.btn.sm{padding:5px 10px;font-size:11px}
.spacer{flex:1}

/* bars */
.barbg{height:8px;background:#EEF2F7;border-radius:20px;overflow:hidden}
.barbg>div{height:100%;border-radius:20px;transition:width .4s}

/* drawer */
.overlay{position:fixed;inset:0;background:rgba(11,31,58,.4);opacity:0;pointer-events:none;transition:.2s;z-index:8}
.overlay.on{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:0;height:100vh;width:430px;max-width:94vw;background:#fff;box-shadow:-10px 0 40px rgba(11,31,58,.18);transform:translateX(100%);transition:.25s cubic-bezier(.4,0,.2,1);z-index:9;overflow-y:auto;padding:22px}
.drawer.on{transform:translateX(0)}
.drawer .x{position:absolute;top:16px;right:16px;background:none;border:none;font-size:24px;color:var(--mute);cursor:pointer;line-height:1}
.flash{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--navy);color:#fff;padding:12px 18px;border-radius:11px;font-size:13px;font-weight:500;box-shadow:0 8px 30px rgba(11,31,58,.3);transition:.3s;z-index:20;max-width:90vw}
.flash.on{transform:translateX(-50%) translateY(0)}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeUp .25s ease}
.note{font-size:11px;color:var(--mute);font-style:italic;text-align:center;margin-top:6px}
.srcnote{display:inline-flex;align-items:center;gap:6px;font-size:10.5px;font-weight:600;background:#EEF2F7;color:var(--mute);padding:4px 10px;border-radius:7px}
.empty{padding:28px;text-align:center;color:var(--mute);font-size:13px}
</style>
</head>
<body>

<aside>
  <div class="brand">
    <div class="logo">S</div>
    <div><b>SYNC</b><small>Subsidiary sYnergy &amp; Control Hub</small></div>
  </div>
  <div id="navwrap"></div>
  <div class="pelindo"><span class="chip">PELINDO</span><div>Integrated Performance</div></div>
</aside>

<main>
  <div class="tophead">
    <div><h1 id="pgTitle"></h1><div class="sub" id="pgSub"></div></div>
    <div class="period">
      <span class="pbox">📅 Q2 2025 (Apr–Jun)</span><span style="font-size:12px;color:var(--mute)">vs</span>
      <span class="pbox muted">Q2 2024</span>
    </div>
  </div>
  <div id="view"></div>
</main>

<div class="overlay" id="overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer"></div>
<div class="flash" id="flash"></div>

<script>
/* ================================================================
   SYNC — Subsidiary sYnergy & Control Hub
   Single-file app. Struktur data mengikuti arsitektur dua jenis:

   JENIS 1 (READ-ONLY) — data kinerja dari sistem direktorat.
   Di produksi: di-fetch via API dari Sistem Keuangan (ERP),
   Operasional (TOS), dan Komersial. Di prototipe: dummy di bawah.
   SYNC TIDAK menyimpan ulang data ini.

   JENIS 2 (READ-WRITE) — data yang LAHIR di SYNC:
   action items, keputusan exception, status/aksi korporasi.
   Disimpan permanen (localStorage; nanti diganti Supabase).
   ================================================================ */

const C = {navy:'#0B1F3A',teal:'#009CA6',tealD:'#0B7C83',amber:'#F5A623',red:'#E03E3E',green:'#1FA971',mute:'#6B7C93',line:'#E2E8F0'};
const ST = {
  ontrack:{label:'On Track',c:C.green,bg:'#E7F5EE'},
  atrisk:{label:'At Risk',c:C.amber,bg:'#FEF4E2'},
  offtrack:{label:'Off Track',c:C.red,bg:'#FCEAEA'},
};

/* ============ JENIS 1 — simulasi respons API sistem direktorat ============ */
const GROUP_KPI = [
  {k:'Revenue',u:'IDR Bn',v:'24.580',yoy:8.6,up:1,s:'ontrack'},
  {k:'EBITDA',u:'IDR Bn',v:'7.258',yoy:10.3,up:1,s:'ontrack'},
  {k:'Net Profit',u:'IDR Bn',v:'1.050',yoy:7.0,up:1,s:'ontrack'},
  {k:'Operating Margin',u:'%',v:'20,6',yoy:1.6,up:1,s:'atrisk'},
  {k:'ROIC',u:'%',v:'12,8',yoy:1.2,up:1,s:'ontrack'},
  {k:'Exception Alerts',u:'Total',v:'18',yoy:6,up:0,s:'offtrack',alert:1},
];
const TREND = [
  {m:'Jan',rev:19800,mg:28},{m:'Feb',rev:20400,mg:29},{m:'Mar',rev:21100,mg:28.5},
  {m:'Apr',rev:22600,mg:30},{m:'May',rev:23400,mg:30.4},{m:'Jun',rev:24580,mg:31},
];
/* per-entitas: revenue Q2'25, Q2'24, target, dan status per perspektif */
const ENTITIES = [
  {id:'PTP', nama:'PT Pelindo Terminal Petikemas', rev:4850, prev:4442, tgt:4700, fin:'ontrack', ops:'offtrack', com:'ontrack'},
  {id:'PMT', nama:'PT Pelindo Multi Terminal',     rev:4620, prev:4354, tgt:4500, fin:'atrisk',  ops:'ontrack',  com:'ontrack'},
  {id:'PJM', nama:'PT Pelindo Jasa Maritim',       rev:4150, prev:4545, tgt:4545, fin:'offtrack',ops:'offtrack', com:'offtrack'},
  {id:'PSL', nama:'PT Pelindo Sinergi Lokaseva',   rev:3280, prev:3145, tgt:3400, fin:'atrisk',  ops:'ontrack',  com:'atrisk'},
  {id:'JICT',nama:'PT Jakarta Int. Container Terminal', rev:2890, prev:2681, tgt:2800, fin:'ontrack', ops:'ontrack', com:'ontrack'},
  {id:'PHC', nama:'PT Pelindo Husada Citra',       rev:1950, prev:1996, tgt:2050, fin:'atrisk',  ops:'atrisk',   com:'ontrack'},
];
/* variance bridge revenue grup (IDR Bn) */
const BRIDGE = [
  {f:'Target Q2',v:26800,type:'anchor'},
  {f:'Δ Volume',v:-900,type:'delta'},
  {f:'Δ Tarif',v:-820,type:'delta'},
  {f:'Δ Mix layanan',v:-500,type:'delta'},
  {f:'Δ Lainnya',v:0,type:'delta'},
  {f:'Aktual Q2',v:24580,type:'anchor'},
];
/* variance per entitas terhadap target */
const EXCEPTIONS = [
  {id:'EX-104',t:'Pendapatan di bawah target',e:'PJM',metric:'-8,7% vs target',impact:'High',s:'offtrack',
   threshold:'Deviasi revenue > 5% dari target',
   root:'Throughput petikemas turun 11,3%; tarif rata-rata melemah. Terkonsentrasi di layanan Pemanduan Regional 2.',
   rec:'Optimalkan kapasitas alat & perkuat strategi harga; rotasi pandu dari Regional 4; buka Deep Dive untuk rincian.'},
  {id:'EX-098',t:'Biaya operasi di atas target',e:'PMT',metric:'+6,5% vs target',impact:'Medium',s:'atrisk',
   threshold:'Biaya operasi > 3% di atas target',
   root:'Kenaikan biaya energi & lembur pada shift bongkar muat puncak.',
   rec:'Review jadwal shift; negosiasi ulang kontrak energi via kontrak payung.'},
  {id:'EX-091',t:'Container throughput menurun',e:'PTP',metric:'-11,3% MoM',impact:'High',s:'offtrack',
   threshold:'Penurunan throughput > 8% MoM',
   root:'Kongesti yard: dwelling time naik di dua terminal utama, yard occupancy 78% (batas 70%).',
   rec:'Aktifkan yard overflow plan; percepat clearance dokumen; benchmark pola Regional 4.'},
  {id:'EX-087',t:'Receivable days memburuk',e:'PSL',metric:'+18 hari vs PY',impact:'Medium',s:'atrisk',
   threshold:'Collection period > 45 hari',
   root:'Konsentrasi piutang pada 3 pelanggan korporat besar; termin longgar.',
   rec:'Perketat termin; aktifkan program collection terjadwal.'},
];
/* struktur anak perusahaan (metadata; status & aksi = Jenis 2) */
const SUBS_TREE = [
  {id:'PTP',nama:'PT Pelindo Terminal Petikemas',anak:8},
  {id:'PMT',nama:'PT Pelindo Multi Terminal',anak:3},
  {id:'PJM',nama:'PT Pelindo Jasa Maritim',anak:10},
  {id:'PSL',nama:'PT Pelindo Sinergi Lokaseva',anak:7},
  {id:'JICT',nama:'PT Jakarta International Container Terminal',anak:0},
  {id:'KOJA',nama:'KSO Terminal Petikemas Koja',anak:0},
  {id:'PMLI',nama:'PT Pendidikan Maritim dan Logistik Indonesia',anak:1},
  {id:'ILCS',nama:'PT Integrasi Logistik Cipta Solusi',anak:0},
  {id:'EDII',nama:'PT Electronic Data Interchange Indonesia',anak:0},
  {id:'PHC',nama:'PT Pelindo Husada Citra',anak:0},
];
/* deep dive: dekomposisi EX-104 */
const DD = {
  svc:[{n:'Pemanduan',dev:-62,abs:'-1.376 Bn'},{n:'Penundaan',dev:-21,abs:'-466 Bn'},{n:'Tambat',dev:-11,abs:'-244 Bn'},{n:'Lainnya',dev:-6,abs:'-133 Bn'}],
  reg:[{n:'Regional 2',dev:-14.2},{n:'Regional 1',dev:-3.0},{n:'Regional 3',dev:-2.1},{n:'Regional 4',dev:1.0}],
  findings:[
    {t:'Kekurangan personel pandu (8 posisi kosong)',d:5,u:5,ef:3,pic:'SDM PJM + Ops Reg. 2',hor:'Struktural'},
    {t:'3 unit motor pandu rusak menunggu suku cadang',d:4,u:4,ef:2,pic:'Teknik PJM Reg. 2',hor:'Quick win'},
    {t:'Penjadwalan pandu masih manual',d:3,u:3,ef:4,pic:'IT PJM + Ops',hor:'Struktural'},
    {t:'Koordinasi jendela pasang-surut belum optimal',d:2,u:3,ef:2,pic:'Ops Reg. 2',hor:'Quick win'},
  ],
};

/* ============ JENIS 2 — data milik SYNC (persisted) ============ */
const DEFAULT_STATE = {
  actions:[
    {id:'ACT-051',t:'Susun yard overflow plan PTP',from:'EX-091',e:'PTP',pic:'Ops Dir. — Reza',due:'2025-07-18',st:'progress'},
    {id:'ACT-050',t:'Negosiasi ulang kontrak energi PMT',from:'EX-098',e:'PMT',pic:'Proc. — Andini',due:'2025-07-22',st:'open'},
    {id:'ACT-047',t:'Program collection piutang PSL',from:'EX-087',e:'PSL',pic:'Fin. — Bimo',due:'2025-07-15',st:'open'},
    {id:'ACT-042',t:'Review strategi tarif PJM',from:'EX-104',e:'PJM',pic:'Comm. — Sari',due:'2025-07-10',st:'done'},
  ],
  exDecisions:{},           /* {EX-104:{status:'assigned'|'reviewed'|'dismissed', note}} */
  subsStatus:{},            /* {PTP:{status:'Active', aksi:'...'}} */
  seq:52,
};
const TODAY = '2025-07-15'; /* tanggal "hari ini" untuk demo — samakan dengan Last Updated */

const store = (()=>{
  const KEY='sync_app_v1';
  let mem=null;
  function load(){
    if(mem) return mem;
    try{ const raw=localStorage.getItem(KEY); mem = raw? JSON.parse(raw) : structuredClone(DEFAULT_STATE); }
    catch(e){ mem = structuredClone(DEFAULT_STATE); }
    return mem;
  }
  function save(){ try{ localStorage.setItem(KEY, JSON.stringify(mem)); }catch(e){} }
  function reset(){ mem=structuredClone(DEFAULT_STATE); save(); }
  return {get:load, save, reset};
})();
const S = () => store.get();

/* ============ helpers ============ */
const $ = id => document.getElementById(id);
const fmt = n => Number(n).toLocaleString('id-ID');
const pct = (a,b) => b? Math.round(a/b*100) : 0;
function pill(s){const m=ST[s];return `<span class="pill" style="background:${m.bg};color:${m.c}"><span class="sdot" style="background:${m.c}"></span>${m.label}</span>`;}
function sdot(s){return `<span class="sdot" style="background:${ST[s].c}" title="${ST[s].label}"></span>`;}
function flash(msg){const f=$('flash');f.textContent=msg;f.classList.add('on');clearTimeout(f._t);f._t=setTimeout(()=>f.classList.remove('on'),3600);}
function spark(data,color,w=64,h=22){
  const max=Math.max(...data),min=Math.min(...data),r=(max-min)||1;
  const pts=data.map((v,i)=>`${(i/(data.length-1))*w},${h-((v-min)/r)*(h-3)-1.5}`).join(' ');
  return `<svg width="${w}" height="${h}"><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2"/></svg>`;
}
function isOverdue(a){ return a.st!=='done' && a.due && a.due < TODAY; }
function actionStatusChip(a){
  if(a.st==='done') return `<span class="pill" style="background:${ST.ontrack.bg};color:${C.green}">Completed</span>`;
  if(isOverdue(a)) return `<span class="pill" style="background:${ST.offtrack.bg};color:${C.red}">Overdue</span>`;
  if(a.st==='progress') return `<span class="pill" style="background:#E6F4F5;color:${C.tealD}">In Progress</span>`;
  return `<span class="pill" style="background:#EEF2F7;color:${C.mute}">Open</span>`;
}
function exStatus(id){ const d=S().exDecisions[id]; return d? d.status : 'new'; }
const EXST = {new:['Baru','#EEF2F7',C.mute], reviewed:['Ditinjau','#E6F4F5',C.tealD], assigned:['Jadi Action','#E7F5EE',C.green], dismissed:['Diabaikan','#FCEAEA',C.red]};
function exChip(id){const [l,bg,fg]=EXST[exStatus(id)];return `<span class="pill" style="background:${bg};color:${fg}">${l}</span>`;}

/* ============ NAV & ROUTER ============ */
const PAGES = [
  {id:'dashboard',label:'Dashboard',sub:'Executive BPR Dashboard · ringkasan kinerja grup'},
  {id:'overview',label:'Performance Overview',sub:'Helicopter view kesehatan grup & tiap entitas'},
  {id:'kpi',label:'KPI Monitoring',sub:'Status & pencapaian target tiap KPI'},
  {id:'variance',label:'Variance & Insight',sub:'Dari mana gap terhadap target berasal'},
  {id:'subs',label:'Subsidiaries',sub:'Struktur anak perusahaan, status & aksi korporasi'},
  {id:'exception',label:'Exception Center',sub:'Isu di atas threshold — tinjau, tugaskan, atau abaikan'},
  {id:'deepdive',label:'Deep Dive',sub:'Bedah akar masalah sampai wilayah & prioritas'},
  {id:'action',label:'Action Tracker',sub:'Eksekusi keputusan — closed loop sampai tuntas'},
  {id:'loop',label:'Improvement Loop',sub:'Data → Insight → Action → Outcome → Feedback'},
  {id:'reports',label:'Reports',sub:'Laporan otomatis siap unduh'},
  {id:'data',label:'Data Management',sub:'Status integrasi sumber & data aplikasi'},
  {id:'admin',label:'Administration',sub:'Role, akses & decision rights'},
];
const ICONS = {dashboard:'▦',overview:'📊',kpi:'〰',variance:'⇄',subs:'🏢',exception:'⚠',deepdive:'🔎',action:'☑',loop:'↻',reports:'📄',data:'🗄',admin:'⚙'};
let current='dashboard';

function renderNav(){
  const exNew = EXCEPTIONS.filter(x=>exStatus(x.id)==='new').length;
  const actOpen = S().actions.filter(a=>a.st!=='done').length;
  $('navwrap').innerHTML = PAGES.map(p=>{
    let badge='';
    if(p.id==='exception'&&exNew) badge=`<span class="badge hot">${exNew}</span>`;
    if(p.id==='action'&&actOpen) badge=`<span class="badge">${actOpen}</span>`;
    return `<button class="nav ${current===p.id?'on':''}" onclick="go('${p.id}')"><span style="width:16px;text-align:center">${ICONS[p.id]}</span>${p.label}${badge}</button>`;
  }).join('');
}
function go(id){ current=id; closeDrawer(); render(); window.scrollTo({top:0}); }
function render(){
  const p=PAGES.find(x=>x.id===current);
  $('pgTitle').textContent=p.label==='Dashboard'?'Executive BPR Dashboard':p.label;
  $('pgSub').textContent=p.sub;
  renderNav();
  $('view').innerHTML = R[current]();
  $('view').classList.remove('fade'); void $('view').offsetWidth; $('view').classList.add('fade');
}

/* ============ PAGE RENDERERS ============ */
const R = {};

/* ---------- DASHBOARD ---------- */
R.dashboard = () => {
  const kcards = GROUP_KPI.map(k=>`
    <div class="kcard"><span class="dot" style="background:${ST[k.s].c}"></span>
      <div class="lab">${k.k}</div><div class="unit mono">${k.u}</div>

function trendChart(w,h){
  const max=26000,pad=28;
  const bw=(w-pad)/TREND.length*0.5;
  let bars='',line='',pts=[];
  TREND.forEach((t,i)=>{
    const x=pad+i*((w-pad)/TREND.length)+((w-pad)/TREND.length-bw)/2;
    const bh=(t.rev/max)*(h-30);
    bars+=`<rect x="${x}" y="${h-20-bh}" width="${bw}" height="${bh}" rx="5" fill="${C.teal}"/>`;
    bars+=`<text x="${x+bw/2}" y="${h-6}" font-size="10" fill="${C.mute}" text-anchor="middle">${t.m}</text>`;
    pts.push([x+bw/2,h-20-(t.mg/35)*(h-30)]);
  });
  line=`<polyline points="${pts.map(p=>p.join(',')).join(' ')}" fill="none" stroke="${C.amber}" stroke-width="2.5"/>`+pts.map(p=>`<circle cx="${p[0]}" cy="${p[1]}" r="3" fill="${C.amber}"/>`).join('');
  return `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:auto">${bars}${line}</svg>
  <div style="display:flex;gap:14px;font-size:11px;color:var(--mute)"><span><span class="sdot" style="background:${C.teal}"></span> Revenue (IDR Bn)</span><span><span class="sdot" style="background:${C.amber}"></span> EBITDA Margin (%)</span></div>`;
}

/* ---------- VARIANCE & INSIGHT (dikembangkan) ---------- */
R.variance = () => {
  /* waterfall */
  const max=27500, W=680, H=230, n=BRIDGE.length, bw=W/n*0.56;
  let run=0, svg='';
  BRIDGE.forEach((b,i)=>{
    const x=i*(W/n)+(W/n-bw)/2;
    let y0,y1,col;
    if(b.type==='anchor'){ y0=0; y1=b.v; col=i===0?C.navy:C.teal; run=b.v; }
    else { y0=run+Math.min(0,b.v); y1=run+Math.max(0,b.v); col=b.v<0?C.red:C.green; run+=b.v; if(b.v===0){y0=run-40;y1=run+40;col='#CBD5E1';} }
    const py=v=>H-24-(v/max)*(H-40);
    svg+=`<rect x="${x}" y="${py(Math.max(y0,y1))}" width="${bw}" height="${Math.max(3,Math.abs(py(y0)-py(y1)))}" rx="4" fill="${col}" opacity="${b.v===0&&b.type!=='anchor'?0.35:1}"/>`;
    svg+=`<text x="${x+bw/2}" y="${H-8}" font-size="9.5" fill="${C.mute}" text-anchor="middle">${b.f}</text>`;
    const lblv = b.type==='anchor'? fmt(b.v) : (b.v>0?'+':'')+fmt(b.v);
    svg+=`<text x="${x+bw/2}" y="${py(Math.max(y0,y1))-5}" font-size="10" font-weight="700" fill="${col==='#CBD5E1'?C.mute:col}" text-anchor="middle" font-family="JetBrains Mono">${lblv}</text>`;
    if(b.type!=='anchor'&&i<n-1){ const nx=(i+1)*(W/n)+(W/n-bw)/2; svg+=`<line x1="${x+bw}" y1="${py(run)}" x2="${nx}" y2="${py(run)}" stroke="${C.line}" stroke-dasharray="3 3"/>`; }
  });
  /* per-entity variance */
  const evar = ENTITIES.map(e=>({...e, gap:e.rev-e.tgt})).sort((a,b)=>a.gap-b.gap);
  const totGap = evar.reduce((s,e)=>s+Math.min(0,e.gap),0);
  const evRows = evar.map(e=>{
    const contrib = e.gap<0? Math.round(e.gap/totGap*100):0;
    return `<tr><td><b>${e.id}</b></td>
      <td class="tr mono" style="color:var(--mute)">${fmt(e.tgt)}</td>
      <td class="tr mono" style="font-weight:700">${fmt(e.rev)}</td>
      <td class="tr mono" style="font-weight:800;color:${e.gap>=0?C.green:C.red}">${e.gap>0?'+':''}${fmt(e.gap)}</td>
      <td style="min-width:110px">${e.gap<0?`<div class="barbg"><div style="width:${contrib}%;background:${C.red}"></div></div>`:'<span style="font-size:11px;color:'+C.green+';font-weight:700">di atas target ✓</span>'}</td>
      <td class="tr" style="font-size:11.5px;color:var(--mute)">${e.gap<0? contrib+'% dari gap':'—'}</td></tr>`;
  }).join('');
  return `
  <div class="card"><h2>Variance Bridge — Revenue Grup Q2 (IDR Bn)</h2>
    <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">${svg}</svg>
    <div style="font-size:12px;color:var(--mute)">Gap total <b class="mono" style="color:${C.red}">-2.220 Bn</b> terhadap target — 78% berasal dari penurunan volume &amp; tarif.</div>
  </div>
  <div class="grid gwide">
    <div class="card" style="margin:0"><h2>Kontribusi Gap per Entitas</h2>
      <table><tr><th>Entitas</th><th class="tr">Target</th><th class="tr">Aktual</th><th class="tr">Gap</th><th>Kontribusi ke gap</th><th class="tr"></th></tr>${evRows}</table>
      <div style="margin-top:10px"><span class="srcnote">🗄️ Sumber: Sistem Keuangan (simulasi) · baca-saja</span></div>
    </div>
    <div class="card" style="margin:0;background:linear-gradient(160deg,var(--navy),var(--navy2));border-color:var(--navy3)">
      <h2 style="color:#fff">✦ Narasi Otomatis <span class="mono" style="margin-left:auto;font-size:9px;color:#7E93AE;font-weight:500">SYNC ENGINE</span></h2>
      ${[['Key Insight','Revenue meleset Rp 2.220 Bn dari target. PJM penyumbang gap terbesar (deviasi -8,7%), disusul PHC dan PSL.'],
         ['Root Cause (Predicted)','82% gap PJM berasal dari penurunan volume & tarif layanan Pemanduan, terkonsentrasi di Regional 2.'],
         ['Proyeksi','Tanpa intervensi, deviasi Q3 diproyeksikan melebar ke ± Rp 2.900 Bn.'],
         ['Rekomendasi','Intervensi tarif & kapasitas PJM dalam 30 hari; buka Deep Dive untuk ranking prioritas temuan.']].map(b=>`
      <div style="margin-bottom:11px"><div style="color:${C.amber};font-size:10.5px;font-weight:700;margin-bottom:3px">${b[0]}</div>
      <div style="color:#C7D4E5;font-size:12.5px;line-height:1.55">${b[1]}</div></div>`).join('')}

let actFilter={st:'all',e:'all',q:''};

  </div>

    <table><tr><th>ID / Sumber</th><th>Tindakan</th><th>PIC</th><th>Deadline</th><th>Status</th><th></th></tr>
    ${rows.length? rows.map(a=>`
    <tr class="${isOverdue(a)?'':''}" style="${isOverdue(a)?'background:#FFF8F8':''}">

function openDrawer(html){ $('drawer').innerHTML=`<button class="x" onclick="closeDrawer()">×</button>`+html; $('drawer').classList.add('on'); $('overlay').classList.add('on'); }
function closeDrawer(){ $('drawer').classList.remove('on'); $('overlay').classList.remove('on'); }

render();
</script>
</body>
